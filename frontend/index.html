<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Orange Sports — Arb Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --accent: #f0883e;
      --green: #3fb950;
      --red: #f85149;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 1rem;
    }
    header {
      text-align: center;
      padding: 1.5rem 0;
    }
    header h1 {
      color: var(--accent);
      font-size: 1.8rem;
    }
    header p {
      color: #8b949e;
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 1rem 0;
      flex-wrap: wrap;
    }
    .controls label { color: #8b949e; font-size: 0.85rem; }
    .controls input, .controls select {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      font-size: 0.85rem;
    }
    #status-bar {
      text-align: center;
      padding: 0.5rem;
      font-size: 0.8rem;
      color: #8b949e;
    }
    #status-bar .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      background: var(--green);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    th, td {
      padding: 0.6rem 0.8rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    th {
      background: var(--card);
      color: var(--accent);
      position: sticky;
      top: 0;
    }
    tr:hover { background: rgba(240,136,62,0.06); }
    .profit { color: var(--green); font-weight: 600; }
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #8b949e;
    }
    @media (max-width: 700px) {
      table, thead, tbody, th, td, tr { display: block; }
      th { display: none; }
      td {
        padding: 0.4rem 0.8rem;
        text-align: right;
        border: none;
        position: relative;
      }
      td::before {
        content: attr(data-label);
        position: absolute;
        left: 0.8rem;
        font-weight: 600;
        text-align: left;
        color: var(--accent);
      }
      tr { border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🏈 Agent Orange Sports</h1>
    <p>Live Arbitrage Dashboard</p>
  </header>

  <div class="controls">
    <div>
      <label for="min-profit">Min Profit %</label><br />
      <input id="min-profit" type="number" value="0.5" step="0.1" min="0" />
    </div>
    <div>
      <label for="refresh-rate">Refresh (s)</label><br />
      <input id="refresh-rate" type="number" value="30" step="5" min="5" />
    </div>
  </div>

  <div id="status-bar"><span class="dot"></span> Connecting…</div>

  <table>
    <thead>
      <tr>
        <th>Sport</th>
        <th>Event</th>
        <th>Book 1</th>
        <th>Outcome 1</th>
        <th>Odds 1</th>
        <th>Book 2</th>
        <th>Outcome 2</th>
        <th>Odds 2</th>
        <th>Profit %</th>
        <th>Stake 1</th>
        <th>Stake 2</th>
      </tr>
    </thead>
    <tbody id="arb-body">
      <tr><td colspan="11" class="empty-state">Loading data…</td></tr>
    </tbody>
  </table>

  <script>
    const tbody    = document.getElementById('arb-body');
    const statusEl = document.getElementById('status-bar');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(String(text)));
      return div.innerHTML;
    }

    async function fetchArbs() {
      const minProfit = document.getElementById('min-profit').value || 0.5;
      try {
        const res  = await fetch('/api/arbs?min_profit=' + encodeURIComponent(minProfit));
        const arbs = await res.json();

        statusEl.innerHTML = '<span class="dot"></span> Last updated: ' + new Date().toLocaleTimeString();

        if (!arbs.length) {
          tbody.innerHTML = '<tr><td colspan="11" class="empty-state">No arbitrage opportunities found yet — scanner is running.</td></tr>';
          return;
        }

        tbody.innerHTML = arbs.map(a => `
          <tr>
            <td data-label="Sport">${escapeHtml(a.sport)}</td>
            <td data-label="Event">${escapeHtml(a.event)}</td>
            <td data-label="Book 1">${escapeHtml(a.book1)}</td>
            <td data-label="Outcome 1">${escapeHtml(a.outcome1)}</td>
            <td data-label="Odds 1">${escapeHtml(a.odds1)}</td>
            <td data-label="Book 2">${escapeHtml(a.book2)}</td>
            <td data-label="Outcome 2">${escapeHtml(a.outcome2)}</td>
            <td data-label="Odds 2">${escapeHtml(a.odds2)}</td>
            <td data-label="Profit %" class="profit">${escapeHtml(a.profit_pct)}%</td>
            <td data-label="Stake 1">$${escapeHtml(a.stake1)}</td>
            <td data-label="Stake 2">$${escapeHtml(a.stake2)}</td>
          </tr>`).join('');
      } catch (err) {
        statusEl.innerHTML = '<span class="dot" style="background:var(--red)"></span> Connection error';
        console.error(err);
      }
    }

    // Initial load + auto-refresh
    fetchArbs();
    let timer = setInterval(fetchArbs, (document.getElementById('refresh-rate').value || 30) * 1000);

    document.getElementById('refresh-rate').addEventListener('change', function () {
      clearInterval(timer);
      timer = setInterval(fetchArbs, (this.value || 30) * 1000);
    });

    document.getElementById('min-profit').addEventListener('change', fetchArbs);
  </script>
</body>
</html>
